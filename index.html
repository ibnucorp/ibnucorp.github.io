<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        body {
            font-family: sans-serif;
            background: linear-gradient(180deg, #e0f7fa 0%, #ffffff 100%);
            color: #455a64;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 { color: #0277bd; }
        .repo-card {
            background: rgba(255, 255, 255, 0.7);
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #b3e5fc;
        }
        a { color: #0288d1; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>My Projects</h1>
    <div id="repos">Loading repositories...</div>

    <script>
        // Replace 'YOUR_USERNAME' with your actual GitHub username
        const username = 'ibnucorp'

        async function fetchRepos() {
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated`);
                const repos = await response.json();
                const container = document.getElementById('repos');
                container.innerHTML = '';

                repos.forEach(repo => {
                    // Only show public repos
                    const div = document.createElement('div');
                    div.className = 'repo-card';
                    div.innerHTML = `
                        <strong><a href="${repo.html_url}" target="_blank">${repo.name}</a></strong><br>
                        ${repo.description || 'No description.'}
                        ${repo.has_pages ? `<br><small>👉 <a href="https://${username}.github.io/${repo.name}/" target="_blank">Live Demo</a></small>` : ''}
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                document.getElementById('repos').innerText = 'Failed to load repositories.';
            }
        }

        fetchRepos();
    </script>
</body>
</html>
